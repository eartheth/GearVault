<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GearVault</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<div class="sidebar">

    <div class="logo">

        <div class="logo-icon">
            <i class="fa-solid fa-boxes-stacked"></i>
        </div>

        <div>
            <h1>GearVault</h1>
            <small>Lighting Inventory</small>
        </div>

    </div>

    <nav>

        <button class="nav-btn active">
            <i class="fa-solid fa-barcode"></i>
            Scanner
        </button>

        <button class="nav-btn">
            <i class="fa-solid fa-box"></i>
            Inventory
        </button>

        <button class="nav-btn">
            <i class="fa-solid fa-clock-rotate-left"></i>
            Recent
        </button>

        <button class="nav-btn">
            <i class="fa-solid fa-gear"></i>
            Settings
        </button>

    </nav>

</div>

<div class="main">

<header>

    <div>

        <h2>Inventory Scanner</h2>

        <p>
            Scan a barcode to instantly check and update equipment.
        </p>

    </div>

    <button id="cameraBtn" class="primary">

        <i class="fa-solid fa-camera"></i>

        Camera Scan

    </button>

</header>

<section class="stats">

    <div class="stat">

        <span>Total Items</span>

        <h3 id="totalItems">0</h3>

    </div>

    <div class="stat">

        <span>Available</span>

        <h3 id="availableItems">0</h3>

    </div>

    <div class="stat">

        <span>Missing</span>

        <h3 id="missingItems">0</h3>

    </div>

</section>

<section class="scanner-card">

    <h3>

        <i class="fa-solid fa-barcode"></i>

        Barcode Scanner

    </h3>

    <div class="scan-box">

        <input
            id="barcodeInput"
            type="text"
            placeholder="Scan or type barcode..."
            autofocus>

        <button id="scanBtn">

            Search

        </button>

    </div>

</section>

<section class="equipment-card">

    <div class="card-title">

        Equipment Details

    </div>

    <div class="grid">

        <div>

            <label>Name</label>

            <input
            id="itemName"
            type="text">

        </div>

        <div>

            <label>Barcode</label>

            <input
            id="itemBarcode"
            type="text">

        </div>

        <div>

            <label>Category</label>

            <input
            id="itemCategory"
            type="text">

        </div>

        <div>

            <label>Case</label>

            <input
            id="itemCase"
            type="text">

        </div>

        <div>

            <label>Location</label>

            <input
            id="itemLocation"
            type="text">

        </div>

        <div>

            <label>Quantity</label>

            <input
            id="itemQty"
            type="number"
            value="1">

        </div>

    </div>

    <div class="buttons">

        <button
        class="success"
        id="foundBtn">

            ✓ Found

        </button>

        <button
        class="warning"
        id="missingBtn">

            Missing

        </button>

        <button
        class="primary"
        id="saveBtn">

            Save Changes

        </button>

    </div>

</section>

<section class="recent-card">

    <div class="card-title">

        Recent Scans

    </div>

    <table>

        <thead>

        <tr>

            <th>Time</th>

            <th>Name</th>

            <th>Barcode</th>

            <th>Status</th>

        </tr>

        </thead>

        <tbody id="recentTable">

            <!-- JS -->

        </tbody>

    </table>

</section>

</div>

<script type="module" src="supabase.js"></script>
<script type="module" src="script.js"></script>
<div id="scannerModal" class="scanner-modal">

    <div class="scanner-window">

        <div class="scanner-header">

            <h3>Scan Barcode</h3>

            <button id="closeScanner">✕</button>

        </div>

        <div id="reader"></div>

    </div>

</div>
</body>
</html>
